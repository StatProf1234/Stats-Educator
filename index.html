<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Biostat Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script defer src="calculators.js"></script>
  <script defer src="app.js"></script>
  <!-- GoatCounter analytics — no_onload since this is a single-page app;
       app.js's route() fires window.goatcounter.count() manually on
       every hash change instead, so each calculator/guide view counts
       as its own pageview. -->
  <script data-goatcounter="https://statprof.goatcounter.com/count"
          data-goatcounter-settings='{"no_onload": true}'
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div id="app">
    <nav id="sidebar" aria-label="Calculator navigation">
      <div class="sidebar-brand-row">
        <a class="sidebar-brand" href="#" aria-label="Home — full calculator index">
          <span class="brand-name">The Biostat<br>Toolkit</span>
          <span class="brand-tagline">Calculators, critical-appraisal guides, and quick reference for coursework, journal clubs, and clinical research.</span>
        </a>
        <button type="button" id="sidebar-toggle" class="sidebar-toggle"
                aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="sidebar-collapsible">
          <span class="sidebar-toggle-icon">☰</span>
        </button>
      </div>
      <div id="sidebar-collapsible" class="sidebar-collapsible">
        <div class="sidebar-search">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="search" id="search" placeholder="Search calculators & guides…"
                 aria-label="Search calculators and guides" autocomplete="off" spellcheck="false">
          <button type="button" id="search-clear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
        </div>
        <a class="wizard-nav-link" href="#wizard">
          <span class="wizard-nav-link-icon">?</span>
          Which Calculator Should I Use?
        </a>
        <a class="wizard-nav-link" href="#learn">
          <span class="wizard-nav-link-icon">L</span>
          Learn — Data, Graphs, Appraisal & Reference
        </a>
        <div id="nav-list" role="list"></div>

        <div class="sidebar-footer">
          © 2026 Michael Glick. All rights reserved.
        </div>
      </div>
    </nav>

    <main id="main" role="main">
      <div id="view"></div>
    </main>
  </div>
</body>
</html>
